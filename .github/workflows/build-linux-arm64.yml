name: build-linux-arm64

on:
  workflow_dispatch:
    inputs:
      abs_version:
        description: "Upstream audiobookshelf tag to build (e.g. v2.35.0). Leave empty for latest release."
        required: false
        type: string
      publish_release:
        description: "Attach the artifact to a GitHub Release with this tag (leave empty to skip)"
        required: false
        type: string

concurrency:
  group: build-linux-arm64-${{ inputs.abs_version || 'latest' }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6

      - name: Resolve upstream version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_ABS_VERSION: ${{ inputs.abs_version }}
        run: |
          set -euo pipefail
          v="$INPUT_ABS_VERSION"
          if [ -z "$v" ]; then
            v="$(gh release view --repo advplyr/audiobookshelf --json tagName --jq .tagName)"
          fi
          if ! printf '%s' "$v" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$'; then
            echo "Refusing untrusted version string: $v" >&2
            exit 1
          fi
          echo "Building audiobookshelf $v"
          echo "abs_version=$v" >> "$GITHUB_OUTPUT"

      - name: Build inside debian:bullseye-slim (glibc 2.31)
        env:
          ABS_VERSION: ${{ steps.resolve.outputs.abs_version }}
        run: |
          set -euo pipefail
          docker run --rm \
            --platform linux/arm64 \
            -e ABS_VERSION \
            -e WORK_DIR=/work/build-cache \
            -e OUT_DIR=/work/dist \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            debian:bullseye-slim \
            bash /work/scripts/build-linux-arm64.sh

      - name: Smoke test — binary starts and reaches production mode
        env:
          ABS_VERSION: ${{ steps.resolve.outputs.abs_version }}
        run: |
          set -euo pipefail
          archive="dist/audiobookshelf-${ABS_VERSION}-linux-arm64.tar.gz"
          test -f "$archive" || { echo "Missing $archive"; exit 1; }
          mkdir -p smoke && tar -xzf "$archive" -C smoke
          dir="smoke/audiobookshelf-${ABS_VERSION}-linux-arm64"
          # The tarball intentionally omits start.sh (delivered by the installer
          # in production); supply the repo's launcher for the smoke test.
          cp "$GITHUB_WORKSPACE/scripts/start.sh" "$dir/start.sh"
          ls -lh "$dir"
          file "$dir/audiobookshelf"
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg >/dev/null
          (
            cd "$dir"
            timeout 15 ./start.sh >server.log 2>&1 || true
          )
          echo "--- server.log ---"
          cat "$dir/server.log" || true
          grep -qi "Running in production" "$dir/server.log" \
            || { echo "Server did not reach 'Running in production' — see log above"; exit 1; }

      - name: Set up node tooling
        uses: jdx/mise-action@v2

      - name: Install E2E deps
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: E2E test (loads, create root, sign in)
        env:
          ABS_VERSION: ${{ steps.resolve.outputs.abs_version }}
        run: |
          set -euo pipefail
          export ABS_BUNDLE_DIR="$GITHUB_WORKSPACE/smoke/audiobookshelf-${ABS_VERSION}-linux-arm64"
          # start.sh is not in the tarball; supply the repo launcher (idempotent).
          cp "$GITHUB_WORKSPACE/scripts/start.sh" "$ABS_BUNDLE_DIR/start.sh"
          test -x "$ABS_BUNDLE_DIR/start.sh" || { echo "bundle not found at $ABS_BUNDLE_DIR"; exit 1; }
          npx playwright test

      - name: Upload E2E screenshots and report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-screenshots-${{ steps.resolve.outputs.abs_version }}-linux-arm64
          path: |
            screenshots/
            playwright-report/
          if-no-files-found: warn

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/audiobookshelf-*-linux-arm64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: audiobookshelf-${{ steps.resolve.outputs.abs_version }}-linux-arm64
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: inputs.publish_release != ''
        env:
          GH_TOKEN: ${{ github.token }}
          ABS_VERSION: ${{ steps.resolve.outputs.abs_version }}
          PUBLISH_TAG: ${{ inputs.publish_release }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$PUBLISH_TAG" | grep -Eq '^[A-Za-z0-9._-]+$'; then
            echo "Refusing untrusted release tag: $PUBLISH_TAG" >&2
            exit 1
          fi
          gh release view "$PUBLISH_TAG" >/dev/null 2>&1 \
            || gh release create "$PUBLISH_TAG" \
                 --title "$PUBLISH_TAG" \
                 --notes "Community binary builds of audiobookshelf $ABS_VERSION."
          gh release upload "$PUBLISH_TAG" dist/*.tar.gz dist/*.sha256 --clobber
